<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全屏AI助手</title>
    <style>
        /* 重置默认样式并设置全屏 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        /* 设置html和body高度为100% */
        html, body {
            height: 100%;
            overflow: hidden; /* 防止滚动条 */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        
        /* 容器样式 */
        #ai-container {
            width: 100%;
            height: 0; /* 初始高度为0，由JS动态设置 */
            min-height: 100vh;
            position: relative;
        }
    </style>
</head>
<body>
    <!-- AI容器 -->
    <div id="ai-container"></div>

    <!-- AI嵌入脚本 -->
    <script src="https://agi-dev-platform-web.cdn.bcebos.com/ai_apaas/embed/output/embedFullSDK.js?responseExpires=0&t=1780750848412"></script>
    <script>
        // 等待DOM加载完成
        document.addEventListener('DOMContentLoaded', function() {
            // 创建AI SDK实例
            new EmbedWebSDK({
                appId: 'cc22535a-6035-4fda-aba8-b94b8b83342d', 
                code: 'embedeUmufuIEkGpGfPOjbQKC', 
                container: document.getElementById('ai-container'),
                renderConfig: {
                    width: '100%',
                    height: '100vh'
                }
            });
        });
    </script>
</body>
</html>
